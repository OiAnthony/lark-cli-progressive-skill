name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 20
      - id: mirror_changes
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          if git diff --quiet "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- config/upstream-overrides.json skills/lark/references/subskills; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - if: ${{ steps.mirror_changes.outputs.changed == 'true' }}
        run: npm run sync:upstream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm test
      - run: npm run check
      - if: ${{ steps.mirror_changes.outputs.changed == 'true' }}
        run: git diff --exit-code -- skills/lark/references/subskills
