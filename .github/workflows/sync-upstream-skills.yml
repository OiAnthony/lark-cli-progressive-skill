name: Sync upstream Lark skills

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream-skills
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - run: npm run sync:upstream
      - run: npm test
      - run: npm run check
      - id: sync_date
        run: echo "date=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_OUTPUT"
      - id: cpr
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          add-paths: skills/lark/references/subskills
          branch: automation/sync-lark-skills
          base: master
          commit-message: "chore(skills): sync lark cli skills (${{ steps.sync_date.outputs.date }})"
          title: "chore(skills): sync lark cli skills"
          body: |
            Automated mirror update from `larksuite/cli`.

            Validated with `npm test` and `npm run check`.
      - name: Merge generated pull request
        if: ${{ steps.cpr.outputs.pull-request-number }}
        run: gh pr merge --squash --delete-branch "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
